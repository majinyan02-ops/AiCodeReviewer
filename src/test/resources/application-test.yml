spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ai_code_reviewer;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
